name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release binaries
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: logparser-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: logparser-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: logparser-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: logparser-darwin-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          go build \
            -ldflags="-X main.version=${VERSION}" \
            -o "dist/${{ matrix.asset_name }}" \
            .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true
